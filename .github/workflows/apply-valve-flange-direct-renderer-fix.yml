name: Apply valve flange direct renderer fix

on:
  push:
    branches:
      - fix/valve-flange-direct-renderer-20260619

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply renderer fix
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          converter_path = Path('src/converter.js')
          source = converter_path.read_text()

          old_create = """function createElementGeometry(element, group, options, elementByNode) {
  const fullA = vectorFrom(element.from, SCALE);
  const fullB = vectorFrom(element.to, SCALE);
  const od = numberValue(element.props.bore, 100) * SCALE;
  const radius = Math.max(0.04, (od / 2));
  const { a, b } = trimmedElementEndpoints(element, elementByNode, radius, fullA, fullB);
  const isRigid = element.rawType && element.rawType !== 'PIPE' && element.rawType !== 'BEND';
  const visualSpec = getValveFlangeVisualSpec(element);
  const isValve = visualSpec?.componentClass === 'VALVE' || (isRigid && /VALVE/i.test(element.rawType || element.props.rigidType || ''));
  const isFlange = visualSpec?.componentClass === 'FLANGE';
  const material = isValve ? valveMat : isFlange ? flangeMat : isRigid ? rigidMat : element.type === 'BEND' ? bendMat : pipeMat;
  const cyl = cylinderBetween(a, b, radius, material, options.compactMode === false ? 24 : 14, element.id);
  cyl.userData = buildComponentUserData(element);
  group.add(cyl);

  if (visualSpec) {
    const catalogVisual = createCatalogLinearComponentVisual(element, visualSpec, a, b, radius, cyl.userData, options);
    if (catalogVisual) group.add(catalogVisual);
  } else if (isRigid) {
    const dir = b.clone().sub(a).normalize();
    const mid = a.clone().add(b).multiplyScalar(0.5);
    const collar1 = cylinderBetween(mid.clone().sub(dir.clone().multiplyScalar(0.18)), mid.clone().add(dir.clone().multiplyScalar(0.18)), radius * 1.35, rigidMat, 18, `${element.id}_RIGID_MARKER`);
    collar1.userData = { ...cyl.userData, meshRole: 'RIGID_MARKER' };
    group.add(collar1);
  }

  if (isBendElement(element)) {
    const bend = createBendGeometry(element, elementByNode, radius, cyl.userData, options);
    if (bend) group.add(bend);
  }
}
"""
          new_create = """function createElementGeometry(element, group, options, elementByNode) {
  const fullA = vectorFrom(element.from, SCALE);
  const fullB = vectorFrom(element.to, SCALE);
  const od = numberValue(element.props.bore, 100) * SCALE;
  const radius = Math.max(0.04, (od / 2));
  const { a, b } = trimmedElementEndpoints(element, elementByNode, radius, fullA, fullB);
  const isRigid = element.rawType && element.rawType !== 'PIPE' && element.rawType !== 'BEND';
  const visualSpec = getValveFlangeVisualSpec(element);
  const baseUserData = buildComponentUserData(element);

  if (visualSpec) {
    const catalogVisual = createCatalogLinearComponentVisual(element, visualSpec, a, b, radius, baseUserData, options);
    if (catalogVisual) {
      group.add(catalogVisual);
      return;
    }
  }

  const isValve = visualSpec?.componentClass === 'VALVE' || (isRigid && /VALVE/i.test(element.rawType || element.props.rigidType || ''));
  const isFlange = visualSpec?.componentClass === 'FLANGE';
  const material = isValve ? valveMat : isFlange ? flangeMat : isRigid ? rigidMat : element.type === 'BEND' ? bendMat : pipeMat;
  const cyl = cylinderBetween(a, b, radius, material, options.compactMode === false ? 24 : 14, element.id);
  cyl.userData = baseUserData;
  group.add(cyl);

  if (isRigid) {
    const dir = b.clone().sub(a).normalize();
    const mid = a.clone().add(b).multiplyScalar(0.5);
    const collar1 = cylinderBetween(mid.clone().sub(dir.clone().multiplyScalar(0.18)), mid.clone().add(dir.clone().multiplyScalar(0.18)), radius * 1.35, rigidMat, 18, `${element.id}_RIGID_MARKER`);
    collar1.userData = { ...baseUserData, meshRole: 'RIGID_MARKER' };
    group.add(collar1);
  }

  if (isBendElement(element)) {
    const bend = createBendGeometry(element, elementByNode, radius, baseUserData, options);
    if (bend) group.add(bend);
  }
}
"""
          if old_create not in source:
              raise SystemExit('createElementGeometry baseline block not found')
          source = source.replace(old_create, new_create)

          old_disc = """    if (primitive.kind === 'disc') {
      add(cylinderAlongAxis(pointAt(primitive.axialOffset), dir, primitive.length, primitive.radius, material, 24, `${element.id}_${primitive.role}`), primitive.role, primitive);
    } else if (primitive.role === 'VALVE_BODY') {
"""
          new_disc = """    if (primitive.kind === 'disc') {
      if (isTaperedLinearPrimitive(primitive)) {
        const { radiusStart, radiusEnd } = taperedRadiiForPrimitive(primitive);
        add(
          frustumAlongAxis(pointAt(primitive.axialOffset), dir, primitive.length, radiusStart, radiusEnd, material, 24, `${element.id}_${primitive.role}`),
          primitive.role,
          { ...primitive, geometryKind: 'FRUSTUM', radiusStart, radiusEnd }
        );
      } else {
        add(cylinderAlongAxis(pointAt(primitive.axialOffset), dir, primitive.length, primitive.radius, material, 24, `${element.id}_${primitive.role}`), primitive.role, { ...primitive, geometryKind: 'CYLINDER' });
      }
    } else if (primitive.role === 'VALVE_BODY') {
"""
          if old_disc not in source:
              raise SystemExit('disc primitive baseline block not found')
          source = source.replace(old_disc, new_disc)

          old_neck = """        const center = pointAt((disc.axialOffset || 0) - sign * (disc.length / 2 + primitive.length / 2));
        add(cylinderAlongAxis(center, dir, primitive.length, primitive.radius, material, 18, `${element.id}_${role}`), role, primitive);
"""
          new_neck = """        const center = pointAt((disc.axialOffset || 0) - sign * (disc.length / 2 + primitive.length / 2));
        const radiusAtFlange = Math.max(primitive.radius, pipeRadius * 1.06);
        const radiusAtPipe = Math.max(pipeRadius * 1.02, 0.004);
        const radiusStart = role.endsWith('_A') ? radiusAtFlange : radiusAtPipe;
        const radiusEnd = role.endsWith('_A') ? radiusAtPipe : radiusAtFlange;
        add(
          frustumAlongAxis(center, dir, primitive.length, radiusStart, radiusEnd, material, 18, `${element.id}_${role}`),
          role,
          { ...primitive, geometryKind: 'FRUSTUM', radiusStart, radiusEnd }
        );
"""
          if old_neck not in source:
              raise SystemExit('weld-neck baseline block not found')
          source = source.replace(old_neck, new_neck)

          old_cylinder = """function cylinderAlongAxis(center, dir, length, radius, material, radialSegments, name) {
  const half = dir.clone().normalize().multiplyScalar(Math.max(length, 0.0001) / 2);
  return cylinderBetween(center.clone().sub(half), center.clone().add(half), Math.max(radius, 0.004), material, radialSegments, name);
}

function catalogVisualUserData"""
          new_cylinder = """function cylinderAlongAxis(center, dir, length, radius, material, radialSegments, name) {
  const half = dir.clone().normalize().multiplyScalar(Math.max(length, 0.0001) / 2);
  return cylinderBetween(center.clone().sub(half), center.clone().add(half), Math.max(radius, 0.004), material, radialSegments, name);
}

function isTaperedLinearPrimitive(primitive = {}) {
  const innerRadius = Number(primitive.innerRadius);
  const outerRadius = Number(primitive.outerRadius);
  if (!Number.isFinite(innerRadius) || !Number.isFinite(outerRadius)) return false;
  if (Math.abs(innerRadius - outerRadius) < 1e-6) return false;
  return primitive.proportionalShoulder === true || /(?:NECK|SHOULDER)/i.test(String(primitive.role || ''));
}

function taperedRadiiForPrimitive(primitive = {}) {
  const innerRadius = Math.max(Number(primitive.innerRadius), 0.004);
  const outerRadius = Math.max(Number(primitive.outerRadius), 0.004);
  const role = String(primitive.role || '').toUpperCase();

  if (role.endsWith('_B')) {
    return { radiusStart: outerRadius, radiusEnd: innerRadius };
  }
  return { radiusStart: innerRadius, radiusEnd: outerRadius };
}

function frustumAlongAxis(center, dir, length, radiusStart, radiusEnd, material, radialSegments, name) {
  const safeLength = Math.max(length, 0.0001);
  const geom = new THREE.CylinderGeometry(
    Math.max(radiusEnd, 0.004),
    Math.max(radiusStart, 0.004),
    safeLength,
    radialSegments,
    1,
    false
  );
  const mesh = new THREE.Mesh(geom, material);
  mesh.name = name;
  mesh.position.copy(center);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
  return mesh;
}

function catalogVisualUserData"""
          if old_cylinder not in source:
              raise SystemExit('cylinder helper insertion point not found')
          source = source.replace(old_cylinder, new_cylinder)
          converter_path.write_text(source)

          test_path = Path('tests/valve-flange-direct-renderer.test.mjs')
          test_path.write_text("""import assert from 'node:assert/strict';
import { readFile } from 'node:fs/promises';
import path from 'node:path';
import { fileURLToPath } from 'node:url';

const repoRoot = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '..');
const converterSource = await readFile(path.join(repoRoot, 'src', 'converter.js'), 'utf8');
const catalogSource = await readFile(path.join(repoRoot, 'src', 'valve-flange-visual-catalog.js'), 'utf8');

function indexOfRequired(pattern, message) {
  const index = converterSource.search(pattern);
  assert.notEqual(index, -1, message);
  return index;
}

const visualBranchIndex = indexOfRequired(/if \(visualSpec\) \{[\s\S]*?createCatalogLinearComponentVisual[\s\S]*?group\.add\(catalogVisual\);[\s\S]*?return;[\s\S]*?\}/, 'valve/flange visual branch must render catalogue and return before legacy fallback');
const legacyCylinderIndex = indexOfRequired(/const cyl = cylinderBetween\(a, b, radius, material/, 'legacy base cylinder fallback must still exist for non-catalogue components');

assert.ok(
  visualBranchIndex < legacyCylinderIndex,
  'catalogue valve/flange rendering must happen before creating a same-component legacy base cylinder'
);

assert.doesNotMatch(
  converterSource.slice(visualBranchIndex, legacyCylinderIndex),
  /const cyl = cylinderBetween|group\.add\(cyl\)/,
  'direct catalogue branch must not create or add a centerline pipe cylinder before returning'
);

assert.match(converterSource, /function frustumAlongAxis\(/, 'renderer must provide a frustum helper for tapered shoulders/necks');
assert.match(converterSource, /new THREE\.CylinderGeometry\(\s*Math\.max\(radiusEnd, 0\.004\),\s*Math\.max\(radiusStart, 0\.004\)/, 'frustum helper must preserve start/end radius orientation');
assert.match(converterSource, /isTaperedLinearPrimitive\(primitive\)/, 'disc primitive renderer must detect tapered shoulder primitives');
assert.match(converterSource, /geometryKind:\s*'FRUSTUM'/, 'tapered valve/flange necks must be tagged as frustums for auditability');
assert.match(converterSource, /WELD_NECK_A[\s\S]*WELD_NECK_B[\s\S]*frustumAlongAxis/, 'weld-neck flange primitives must render as frustums, not collars');

assert.match(catalogSource, /role:\s*'VALVE_NECK_A'[\s\S]*innerRadius[\s\S]*outerRadius/, 'VALVE_NECK_A catalogue primitive must carry taper radii');
assert.match(catalogSource, /role:\s*'VALVE_NECK_B'[\s\S]*innerRadius[\s\S]*outerRadius/, 'VALVE_NECK_B catalogue primitive must carry taper radii');
assert.match(catalogSource, /role:\s*'END_COLLAR_A'[\s\S]*proportionalFlangeThickness:\s*true/, 'END_COLLAR_A must remain a thin proportional end plate');
assert.match(catalogSource, /role:\s*'END_COLLAR_B'[\s\S]*proportionalFlangeThickness:\s*true/, 'END_COLLAR_B must remain a thin proportional end plate');

const packageJson = JSON.parse(await readFile(path.join(repoRoot, 'package.json'), 'utf8'));
assert.match(packageJson.scripts.test, /valve-flange-direct-renderer\.test\.mjs/, 'npm test must include the direct valve/flange renderer gate');

console.log('Valve/flange direct renderer gate passed');
""")

          package_path = Path('package.json')
          package_source = package_path.read_text()
          old_test = 'node tests/valve-flange-visual-catalog.test.mjs && node tests/valve-flange-scene-postprocess.test.mjs'
          new_test = 'node tests/valve-flange-visual-catalog.test.mjs && node tests/valve-flange-direct-renderer.test.mjs && node tests/valve-flange-scene-postprocess.test.mjs'
          if new_test not in package_source:
              if old_test not in package_source:
                  raise SystemExit('npm test insertion point not found')
              package_source = package_source.replace(old_test, new_test)
              package_path.write_text(package_source)
          PY
      - name: Install and validate
        shell: bash
        run: |
          npm install
          npm test
          npm run contract:dry-run
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/apply-valve-flange-direct-renderer-fix.yml
          git add src/converter.js package.json tests/valve-flange-direct-renderer.test.mjs .github/workflows/apply-valve-flange-direct-renderer-fix.yml package-lock.json
          git commit -m "Fix valve flange direct renderer"
          git push
