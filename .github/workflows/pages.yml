name: Deploy static app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate static app files
        run: |
          test -f index.html
          test -f src/app.js
          test -f src/styles.css
          echo "Static app files found."

      - name: Run regression tests
        run: npm test

      - name: Build Pages artifact
        run: npm run build

      - name: Validate bundled artifact
        run: |
          test -f _site/index.html
          test -f _site/assets/app.bundle.js
          test -f _site/assets/static-shell.bundle.js
          grep -q "__3D_MARKUP_BUNDLED_ASSETS__" _site/index.html
          echo "Bundled Pages artifact found."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
