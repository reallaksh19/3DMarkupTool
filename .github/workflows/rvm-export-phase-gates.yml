name: RVM Export Phase Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - ci/phase-gates-rvm-export
  workflow_dispatch:

jobs:
  phase-gates:
    name: RVM/ATT phase gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Start CI timer
        run: echo "CI_PHASE_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run phase-gate tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee phase-gate.log

      - name: Generate BM_CII RVM catalogue sample artifact
        run: npm run artifact:rvm-catalogue-sample

      - name: Generate BM_CII RVM/ATT viewer compatibility audit
        run: npm run artifact:rvm-att-viewer-compat

      - name: Generate BM_CII GLB catalogue visual audit
        run: npm run artifact:glb-catalogue-visual-audit

      - name: Generate BM_CII GLB catalogue scene mesh audit
        run: npm run artifact:glb-catalogue-scene-mesh-audit

      - name: Generate BM_CII GLB catalogue visual regression artifact
        run: npm run artifact:glb-catalogue-visual-regression

      - name: Generate BM_CII support/restraint parity audit
        run: npm run artifact:support-restraint-parity

      - name: Upload RVM catalogue sample artifact
        uses: actions/upload-artifact@v4
        with:
          name: rvm-catalogue-sample
          path: artifacts/rvm-catalogue-sample
          if-no-files-found: error

      - name: Upload RVM/ATT viewer compatibility audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: rvm-att-viewer-compat
          path: artifacts/rvm-att-viewer-compat
          if-no-files-found: error

      - name: Upload GLB catalogue visual audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: glb-catalogue-visual-audit
          path: artifacts/glb-catalogue-visual-audit
          if-no-files-found: error

      - name: Upload GLB catalogue scene mesh audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: glb-catalogue-scene-mesh-audit
          path: artifacts/glb-catalogue-scene-mesh-audit
          if-no-files-found: error

      - name: Upload GLB catalogue visual regression artifact
        uses: actions/upload-artifact@v4
        with:
          name: glb-catalogue-visual-regression
          path: artifacts/glb-catalogue-visual-regression
          if-no-files-found: error

      - name: Upload support/restraint parity audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: support-restraint-parity
          path: artifacts/support-restraint-parity
          if-no-files-found: error

      - name: Upload phase-gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-gate-log
          path: phase-gate.log
          if-no-files-found: ignore

      - name: Finish CI timer
        if: always()
        run: |
          END=$(date +%s)
          ELAPSED=$((END - CI_PHASE_START))
          echo "RVM/ATT phase gates finished in ${ELAPSED}s"
