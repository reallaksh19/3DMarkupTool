name: Reapply Valve Flange Reference Visual Fix

on:
  push:
    branches:
      - fix/reference-style-valve-flange-visuals-v2
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reapply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/reference-style-valve-flange-visuals-v2
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Reapply validated source diff on current main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin fix/reference-style-valve-flange-visuals
          git cherry-pick --no-commit 9e80afce05bb84b435be6367d669f4205f7397e3
          git status --short

      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false

      - name: Validate
        run: |
          npm test
          npm run contract:dry-run

      - name: Commit refreshed source-only fix
        run: |
          git status --short
          git commit -m "Refine valve flange reference visuals"
          git push origin HEAD:fix/reference-style-valve-flange-visuals-v2
