name: RVM Export Phase Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - ci/phase-gates-rvm-export
  workflow_dispatch:

permissions:
  contents: write

jobs:
  phase-gates:
    name: RVM/ATT phase gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply valve/flange renderer patch
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/valve-flange-direct-renderer-pr'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          patch = Path('.github/valve-flange-direct-renderer-source.patch')
          text = patch.read_text()
          for header in [
              '@@ -118,31 +118,38 @@',
              '@@ -220,7 +227,16 @@',
              '@@ -253,6 +269,14 @@',
              '@@ -310,7 +334,43 @@',
              '@@ -0,0 +1,44 @@',
          ]:
              text = text.replace('@@', header, 1)
          patch.write_text(text)
          PY
          git apply .github/valve-flange-direct-renderer-source.patch
          node - <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const marker = 'node tests/valve-flange-visual-catalog.test.mjs && node tests/valve-flange-scene-postprocess.test.mjs';
          const replacement = 'node tests/valve-flange-visual-catalog.test.mjs && node tests/valve-flange-direct-renderer.test.mjs && node tests/valve-flange-scene-postprocess.test.mjs';
          if (!pkg.scripts.test.includes('valve-flange-direct-renderer.test.mjs')) {
            if (!pkg.scripts.test.includes(marker)) throw new Error('package test script insertion point not found');
            pkg.scripts.test = pkg.scripts.test.replace(marker, replacement);
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Start CI timer
        run: echo "CI_PHASE_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run phase-gate tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee phase-gate.log

      - name: Run contract dry-run
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/valve-flange-direct-renderer-pr'
        run: npm run contract:dry-run

      - name: Commit validated renderer patch
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/valve-flange-direct-renderer-pr'
        run: |
          git fetch origin main:refs/remotes/origin/main
          git checkout origin/main -- .github/workflows/rvm-export-phase-gates.yml
          rm -f .github/workflows/apply-valve-flange-direct-renderer.yml .github/valve-flange-direct-renderer-source.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/converter.js package.json tests/valve-flange-direct-renderer.test.mjs .github/workflows/rvm-export-phase-gates.yml .github/workflows/apply-valve-flange-direct-renderer.yml .github/valve-flange-direct-renderer-source.patch
          git commit -m "Fix direct valve flange renderer"
          git push origin HEAD:fix/valve-flange-direct-renderer-pr

      - name: Upload phase-gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-gate-log
          path: phase-gate.log
          if-no-files-found: ignore

      - name: Finish CI timer
        if: always()
        run: |
          END=$(date +%s)
          ELAPSED=$((END - CI_PHASE_START))
          echo "RVM/ATT phase gates finished in ${ELAPSED}s"
