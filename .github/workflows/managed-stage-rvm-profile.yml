name: Managed Stage RVM Profile

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  managed-stage-rvm-profile:
    name: Managed-stage RVM profile gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Run managed-stage RVM profile test
        run: npm run test:managed-stage-rvm 2>&1 | tee managed-stage-test.log

      - name: Upload managed-stage test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: managed-stage-test-log
          path: managed-stage-test.log
          if-no-files-found: ignore

      - name: Verify managed-stage profile summary
        run: node -e "console.log('Managed-stage profile smoke completed; artifact gates verify generated RVM')"

      - name: Generate managed-stage fixture RVM artifact
        run: npm run artifact:managed-stage-rvm 2>&1 | tee managed-stage-artifact.log

      - name: Upload managed-stage artifact log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: managed-stage-artifact-log
          path: managed-stage-artifact.log
          if-no-files-found: ignore

      - name: Verify managed-stage artifact round-trip
        run: npm run verify:managed-stage-rvm-artifact 2>&1 | tee managed-stage-roundtrip.log

      - name: Upload managed-stage roundtrip log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: managed-stage-roundtrip-log
          path: managed-stage-roundtrip.log
          if-no-files-found: ignore

      - name: Verify managed-stage RVM reference layout compatibility
        run: npm run verify:managed-stage-rvm-reference 2>&1 | tee managed-stage-reference.log

      - name: Inspect managed-stage RVM artifact
        run: node scripts/inspect-managed-stage-rvm-artifact-v2.mjs --dir=artifacts/managed-stage-rvm --base=BM_CII_INPUT_managed_stage --expect-bm-cii

      - name: Confirm managed-stage artifact set
        run: node -e "console.log('Managed-stage RVM artifact verification complete')"

      - name: Upload managed-stage RVM artifact
        uses: actions/upload-artifact@v4
        with:
          name: managed-stage-rvm
          path: artifacts/managed-stage-rvm
          if-no-files-found: error
