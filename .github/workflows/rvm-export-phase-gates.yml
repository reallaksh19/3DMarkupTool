name: RVM Export Phase Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - ci/phase-gates-rvm-export
  workflow_dispatch:

permissions:
  contents: write

jobs:
  phase-gates:
    name: RVM/ATT phase gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply valve/flange renderer source fix
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/valve-flange-direct-renderer-pr'
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          let text = fs.readFileSync('src/converter.js', 'utf8');
          function replace(pattern, replacement, label) {
            const next = text.replace(pattern, replacement);
            if (next === text) throw new Error(`replacement failed: ${label}`);
            text = next;
          }
          if (!text.includes('const baseUserData = buildComponentUserData(element);')) {
            replace(/  const visualSpec = getValveFlangeVisualSpec\(element\);\n  const isValve/, `  const visualSpec = getValveFlangeVisualSpec(element);\n  const baseUserData = buildComponentUserData(element);\n\n  if (visualSpec) {\n    const catalogVisual = createCatalogLinearComponentVisual(element, visualSpec, a, b, radius, baseUserData, options);\n    if (catalogVisual) {\n      group.add(catalogVisual);\n      return;\n    }\n  }\n\n  const isValve`, 'catalogue-first branch');
          }
          text = text.replace('  cyl.userData = buildComponentUserData(element);', '  cyl.userData = baseUserData;');
          replace(/\n  if \(visualSpec\) \{\n    const catalogVisual = createCatalogLinearComponentVisual\(element, visualSpec, a, b, radius, cyl\.userData, options\);\n    if \(catalogVisual\) group\.add\(catalogVisual\);\n  \} else if \(isRigid\) \{/, '\n  if (isRigid) {', 'remove legacy-plus-catalogue branch');
          text = text.replace("    collar1.userData = { ...cyl.userData, meshRole: 'RIGID_MARKER' };", "    collar1.userData = { ...baseUserData, meshRole: 'RIGID_MARKER' };");
          text = text.replace('    const bend = createBendGeometry(element, elementByNode, radius, cyl.userData, options);', '    const bend = createBendGeometry(element, elementByNode, radius, baseUserData, options);');
          replace(/    if \(primitive\.kind === 'disc'\) \{\n      add\(cylinderAlongAxis\(pointAt\(primitive\.axialOffset\), dir, primitive\.length, primitive\.radius, material, 24, `\$\{element\.id\}_\$\{primitive\.role\}`\), primitive\.role, primitive\);\n    \} else if \(primitive\.role === 'VALVE_BODY'\) \{/, `    if (primitive.kind === 'disc') {\n      if (isTaperedLinearPrimitive(primitive)) {\n        const { radiusStart, radiusEnd } = taperedRadiiForPrimitive(primitive);\n        add(\n          frustumAlongAxis(pointAt(primitive.axialOffset), dir, primitive.length, radiusStart, radiusEnd, material, 24, \`${'${'}element.id}_${'${'}primitive.role}\`),\n          primitive.role,\n          { ...primitive, geometryKind: 'FRUSTUM', radiusStart, radiusEnd }\n        );\n      } else {\n        add(cylinderAlongAxis(pointAt(primitive.axialOffset), dir, primitive.length, primitive.radius, material, 24, \`${'${'}element.id}_${'${'}primitive.role}\`), primitive.role, { ...primitive, geometryKind: 'CYLINDER' });\n      }\n    } else if (primitive.role === 'VALVE_BODY') {`, 'disc frustum rendering');
          replace(/        add\(cylinderAlongAxis\(center, dir, primitive\.length, primitive\.radius, material, 18, `\$\{element\.id\}_\$\{role\}`\), role, primitive\);/, `        const radiusAtFlange = Math.max(primitive.radius, pipeRadius * 1.06);\n        const radiusAtPipe = Math.max(pipeRadius * 1.02, 0.004);\n        const radiusStart = role.endsWith('_A') ? radiusAtFlange : radiusAtPipe;\n        const radiusEnd = role.endsWith('_A') ? radiusAtPipe : radiusAtFlange;\n        add(\n          frustumAlongAxis(center, dir, primitive.length, radiusStart, radiusEnd, material, 18, \`${'${'}element.id}_${'${'}role}\`),\n          role,\n          { ...primitive, geometryKind: 'FRUSTUM', radiusStart, radiusEnd }\n        );`, 'weld-neck frustum rendering');
          if (!text.includes('function frustumAlongAxis(')) {
            replace(/\nfunction catalogVisualUserData\(baseUserData, spec, meshRole, extra = \{\}\) \{/, `\nfunction isTaperedLinearPrimitive(primitive = {}) {\n  const innerRadius = Number(primitive.innerRadius);\n  const outerRadius = Number(primitive.outerRadius);\n  if (!Number.isFinite(innerRadius) || !Number.isFinite(outerRadius)) return false;\n  if (Math.abs(innerRadius - outerRadius) < 1e-6) return false;\n  return primitive.proportionalShoulder === true || /(?:NECK|SHOULDER)/i.test(String(primitive.role || ''));\n}\n\nfunction taperedRadiiForPrimitive(primitive = {}) {\n  const innerRadius = Math.max(Number(primitive.innerRadius), 0.004);\n  const outerRadius = Math.max(Number(primitive.outerRadius), 0.004);\n  const role = String(primitive.role || '').toUpperCase();\n  if (role.endsWith('_B')) return { radiusStart: outerRadius, radiusEnd: innerRadius };\n  return { radiusStart: innerRadius, radiusEnd: outerRadius };\n}\n\nfunction frustumAlongAxis(center, dir, length, radiusStart, radiusEnd, material, radialSegments, name) {\n  const safeLength = Math.max(length, 0.0001);\n  const geom = new THREE.CylinderGeometry(Math.max(radiusEnd, 0.004), Math.max(radiusStart, 0.004), safeLength, radialSegments, 1, false);\n  const mesh = new THREE.Mesh(geom, material);\n  mesh.name = name;\n  mesh.position.copy(center);\n  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());\n  return mesh;\n}\n\nfunction catalogVisualUserData(baseUserData, spec, meshRole, extra = {}) {`, 'frustum helpers');
          }
          fs.writeFileSync('src/converter.js', text);
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const marker = 'node tests/valve-flange-visual-catalog.test.mjs && node tests/valve-flange-scene-postprocess.test.mjs';
          const replacement = 'node tests/valve-flange-visual-catalog.test.mjs && node tests/valve-flange-direct-renderer.test.mjs && node tests/valve-flange-scene-postprocess.test.mjs';
          if (!pkg.scripts.test.includes('valve-flange-direct-renderer.test.mjs')) {
            if (!pkg.scripts.test.includes(marker)) throw new Error('test insertion point not found');
            pkg.scripts.test = pkg.scripts.test.replace(marker, replacement);
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Write direct renderer regression gate
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/valve-flange-direct-renderer-pr'
        run: |
          cat > tests/valve-flange-direct-renderer.test.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';
          import path from 'node:path';
          import { fileURLToPath } from 'node:url';

          const repoRoot = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '..');
          const converterSource = await readFile(path.join(repoRoot, 'src', 'converter.js'), 'utf8');
          const catalogSource = await readFile(path.join(repoRoot, 'src', 'valve-flange-visual-catalog.js'), 'utf8');

          const visualBranchIndex = converterSource.indexOf('const catalogVisual = createCatalogLinearComponentVisual(element, visualSpec, a, b, radius, baseUserData, options);');
          const legacyCylinderIndex = converterSource.indexOf('const cyl = cylinderBetween(a, b, radius, material');
          assert.notEqual(visualBranchIndex, -1, 'direct catalogue branch must exist');
          assert.notEqual(legacyCylinderIndex, -1, 'legacy fallback cylinder must still exist');
          assert.ok(visualBranchIndex < legacyCylinderIndex, 'catalogue branch must run before legacy fallback cylinder');
          assert.match(converterSource.slice(visualBranchIndex, legacyCylinderIndex), /return;/, 'catalogue branch must return before fallback');
          assert.doesNotMatch(converterSource.slice(visualBranchIndex, legacyCylinderIndex), /group\.add\(cyl\)/, 'catalogue branch must not add a legacy centerline cylinder');
          assert.match(converterSource, /function frustumAlongAxis\(/, 'renderer must define frustum helper');
          assert.match(converterSource, /geometryKind:\s*'FRUSTUM'/, 'tapered neck primitives must be tagged as frustums');
          assert.match(converterSource, /WELD_NECK_A[\s\S]*WELD_NECK_B[\s\S]*frustumAlongAxis/, 'weld-neck primitives must render as frustums');
          assert.match(catalogSource, /'VALVE_NECK_A'/, 'VALVE_NECK_A catalogue primitive must exist');
          assert.match(catalogSource, /'VALVE_NECK_B'/, 'VALVE_NECK_B catalogue primitive must exist');
          assert.match(catalogSource, /function addValveShoulderPrimitive[\s\S]*innerRadius[\s\S]*outerRadius/, 'valve shoulder primitive helper must carry taper radii');
          const packageJson = JSON.parse(await readFile(path.join(repoRoot, 'package.json'), 'utf8'));
          assert.match(packageJson.scripts.test, /valve-flange-direct-renderer\.test\.mjs/, 'npm test must include renderer gate');
          console.log('Valve/flange direct renderer gate passed');
          EOF

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Start CI timer
        run: echo "CI_PHASE_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run phase-gate tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee phase-gate.log

      - name: Run contract dry-run
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/valve-flange-direct-renderer-pr'
        run: npm run contract:dry-run

      - name: Commit validated source changes
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/valve-flange-direct-renderer-pr'
        run: |
          git fetch origin main:refs/remotes/origin/main
          git checkout origin/main -- .github/workflows/rvm-export-phase-gates.yml
          git rm -f .github/workflows/apply-valve-flange-direct-renderer.yml .github/valve-flange-direct-renderer-source.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/converter.js package.json tests/valve-flange-direct-renderer.test.mjs .github/workflows/rvm-export-phase-gates.yml
          git commit -m "Fix direct valve flange renderer"
          git push origin HEAD:fix/valve-flange-direct-renderer-pr

      - name: Upload phase-gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-gate-log
          path: phase-gate.log
          if-no-files-found: ignore

      - name: Finish CI timer
        if: always()
        run: |
          END=$(date +%s)
          ELAPSED=$((END - CI_PHASE_START))
          echo "RVM/ATT phase gates finished in ${ELAPSED}s"
